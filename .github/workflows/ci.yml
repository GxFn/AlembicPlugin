# AlembicPlugin CI
# 当前仓库已经是纯 MCP 插件 runtime，不再启动旧 daemon API 服务。
# Required gates follow the accepted DH-5 verification surface: build/static
# checks, Claude Code runtime parity, and Codex plugin packaging smoke.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_ENV: test

jobs:
  build:
    name: Build & Static Gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AlembicPlugin
    steps:
      - name: Checkout AlembicPlugin
        uses: actions/checkout@v5
        with:
          path: AlembicPlugin
          submodules: true

      - name: Checkout AlembicCore sibling
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicCore
          path: AlembicCore

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            AlembicPlugin/package-lock.json
            AlembicCore/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Core dependencies
        run: npm ci --prefix ../AlembicCore

      - name: Build TypeScript
        run: npm run build

      - name: Run static gates
        run: npm run check

  runtime-parity:
    name: Runtime Parity Tests
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AlembicPlugin
    steps:
      - name: Checkout AlembicPlugin
        uses: actions/checkout@v5
        with:
          path: AlembicPlugin
          submodules: true

      - name: Checkout AlembicCore sibling
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicCore
          path: AlembicCore

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            AlembicPlugin/package-lock.json
            AlembicCore/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Core dependencies
        run: npm ci --prefix ../AlembicCore

      - name: Build TypeScript
        run: npm run build

      - name: Run Claude Code runtime parity tests
        run: npx vitest run test/unit/ClaudeCodeHostRuntime.test.ts

  plugin-smoke:
    name: Plugin Package Smoke
    needs: build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AlembicPlugin
    steps:
      - name: Checkout AlembicPlugin
        uses: actions/checkout@v5
        with:
          path: AlembicPlugin
          submodules: true

      - name: Checkout AlembicCore sibling
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicCore
          path: AlembicCore

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            AlembicPlugin/package-lock.json
            AlembicCore/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Core dependencies
        run: npm ci --prefix ../AlembicCore

      - name: Build TypeScript
        run: npm run build

      - name: Verify Codex plugin metadata
        run: npm run verify:codex-plugin

      - name: Verify plugin distribution
        run: npm run verify:plugin-distribution

      - name: Smoke Codex plugin package
        run: npm run smoke:codex-plugin
