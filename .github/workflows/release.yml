# Alembic 发布：推送 v* tag 后，由 GitHub Actions 构建、测试并发布到 npm
name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # npm provenance / trusted publishing
      contents: read
    defaults:
      run:
        working-directory: AlembicPlugin
    steps:
      - name: Checkout AlembicPlugin
        uses: actions/checkout@v5
        with:
          path: AlembicPlugin
          submodules: true

      - name: Checkout AlembicCore sibling
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicCore
          path: AlembicCore

      - name: Checkout AlembicDashboard sibling
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicDashboard
          path: AlembicDashboard

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            AlembicPlugin/package-lock.json
            AlembicCore/package-lock.json
            AlembicDashboard/package-lock.json
          registry-url: 'https://registry.npmjs.org'

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag version:     ${TAG_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"
          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Install Core dependencies
        run: npm ci --prefix ../AlembicCore

      - name: Install dashboard dependencies
        run: npm ci --prefix ../AlembicDashboard

      - name: Build TypeScript
        run: npm run build

      - name: Build Dashboard
        run: npm run build:dashboard

      - name: Prepare Codex plugin runtime
        run: npm run prepare:codex-plugin-runtime

      - name: Verify Codex channel
        run: npm run verify:codex-channel

      - name: Verify Codex plugin packaging
        run: npm run verify:codex-plugin

      - name: Verify release package boundary
        run: npm run verify:release-package-boundary

      - name: Lint
        run: npm run lint -- --diagnostic-level=error

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration
        env:
          ASD_DISABLE_WRITE_GUARD: '1'
          ASD_DISABLE_RATE_LIMIT: '1'

      - name: Preview npm package
        run: npm pack --dry-run

      - name: Publish to npm
        # Build artifacts are produced above; skip prepublishOnly to avoid duplicate builds.
        # The boundary gate blocks publish while root package.json contains workspace-local file:../ dependencies.
        run: npm run release:package-boundary:publish && npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
