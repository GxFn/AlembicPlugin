# AlembicPlugin 发布：推送 v* tag 后，由 GitHub Actions 构建、测试并上传 Codex 插件产物
name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: AlembicPlugin
    steps:
      - name: Checkout AlembicPlugin
        uses: actions/checkout@v5
        with:
          path: AlembicPlugin
          submodules: true

      - name: Checkout AlembicCore sibling
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicCore
          path: AlembicCore

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            AlembicPlugin/package-lock.json
            AlembicCore/package-lock.json

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag version:     ${TAG_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"
          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Install Core dependencies
        run: npm ci --prefix ../AlembicCore

      - name: Build TypeScript
        run: npm run build

      - name: Prepare Codex plugin shell
        run: npm run prepare:codex-plugin-runtime

      - name: Verify pinned runtime package
        run: npm run verify:codex-runtime-package

      - name: Verify plugin distribution
        run: npm run verify:plugin-distribution

      - name: Verify Codex plugin packaging
        run: npm run verify:codex-plugin

      - name: Verify release package boundary
        run: npm run verify:release-package-boundary

      - name: Verify marketplace shell artifact
        run: |
          test -f plugins/alembic-codex/bin/alembic-start.mjs
          test ! -e plugins/alembic-codex/runtime
          test ! -e plugins/alembic-codex/runtime.tgz
          test ! -e plugins/alembic-codex/node_modules
          node plugins/alembic-codex/bin/alembic-start.mjs --dry-run

      - name: Lint
        run: npm run lint -- --diagnostic-level=error

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration
        env:
          ASD_DISABLE_WRITE_GUARD: '1'
          ASD_DISABLE_RATE_LIMIT: '1'

      - name: Smoke Codex plugin package
        run: npm run smoke:codex-plugin

      - name: Upload Codex plugin artifacts
        uses: actions/upload-artifact@v5
        with:
          name: alembic-codex-plugin-${{ github.ref_name }}
          path: |
            AlembicPlugin/plugins/alembic-codex/.codex-plugin/plugin.json
            AlembicPlugin/plugins/alembic-codex/.mcp.json
            AlembicPlugin/plugins/alembic-codex/bin/alembic-start.mjs
            AlembicPlugin/plugins/alembic-codex/README.md
            AlembicPlugin/plugins/alembic-codex/README.zh-CN.md
            AlembicPlugin/packages/alembic-runtime/package.json
            AlembicPlugin/.agents/plugins/marketplace.json
