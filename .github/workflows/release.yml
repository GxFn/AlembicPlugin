# AlembicPlugin 发布：推送 v* tag 后，由 GitHub Actions 构建、测试并上传 Codex 插件产物
name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-artifacts:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: AlembicPlugin
    steps:
      - name: Checkout AlembicPlugin
        uses: actions/checkout@v5
        with:
          path: AlembicPlugin
          submodules: true

      - name: Checkout AlembicCore sibling
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicCore
          path: AlembicCore

      - name: Checkout AlembicDashboard sibling
        uses: actions/checkout@v5
        with:
          repository: GxFn/AlembicDashboard
          path: AlembicDashboard

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            AlembicPlugin/package-lock.json
            AlembicCore/package-lock.json
            AlembicDashboard/package-lock.json

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag version:     ${TAG_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"
          test "${TAG_VERSION}" = "${PACKAGE_VERSION}"

      - name: Install dependencies
        run: npm ci

      - name: Install Core dependencies
        run: npm ci --prefix ../AlembicCore

      - name: Install dashboard dependencies
        run: npm ci --prefix ../AlembicDashboard

      - name: Build TypeScript
        run: npm run build

      - name: Build Dashboard
        run: npm run build:dashboard

      - name: Prepare Codex plugin runtime
        run: npm run prepare:codex-plugin-runtime

      - name: Verify Codex channel
        run: npm run verify:codex-channel

      - name: Verify Codex plugin packaging
        run: npm run verify:codex-plugin

      - name: Verify release package boundary
        run: npm run verify:release-package-boundary

      - name: Verify portable runtime artifact
        run: |
          test -s plugins/alembic-codex/runtime.tgz
          test -f plugins/alembic-codex/runtime/vendor/AlembicCore/.alembic-source.json
          node -e "const fs = require('fs'); const pkg = JSON.parse(fs.readFileSync('plugins/alembic-codex/runtime/package.json', 'utf8')); const src = JSON.parse(fs.readFileSync('plugins/alembic-codex/runtime/vendor/AlembicCore/.alembic-source.json', 'utf8')); if (pkg.dependencies['@alembic/core'] !== 'file:vendor/AlembicCore') throw new Error('embedded runtime must keep @alembic/core: file:vendor/AlembicCore'); if (src.packageDependency !== 'file:vendor/AlembicCore') throw new Error('embedded runtime source metadata must record file:vendor/AlembicCore'); if (!/^[0-9a-f]{40}$/i.test(src.commit || '')) throw new Error('embedded runtime source metadata must record a 40-character commit');"

      - name: Lint
        run: npm run lint -- --diagnostic-level=error

      - name: Run unit tests
        run: npm run test:unit

      - name: Run integration tests
        run: npm run test:integration
        env:
          ASD_DISABLE_WRITE_GUARD: '1'
          ASD_DISABLE_RATE_LIMIT: '1'

      - name: Smoke Codex plugin package
        run: npm run smoke:codex-plugin

      - name: Upload Codex plugin artifacts
        uses: actions/upload-artifact@v5
        with:
          name: alembic-codex-plugin-${{ github.ref_name }}
          path: |
            AlembicPlugin/plugins/alembic-codex/runtime.tgz
            AlembicPlugin/plugins/alembic-codex/.codex-plugin/plugin.json
            AlembicPlugin/plugins/alembic-codex/.mcp.json
            AlembicPlugin/plugins/alembic-codex/README.md
            AlembicPlugin/plugins/alembic-codex/README.zh-CN.md
            AlembicPlugin/channels/codex/channel.json
            AlembicPlugin/.agents/plugins/marketplace.json
